services:
  - type: web
    name: documenso
    env: docker
    plan: starter # 'starter' or higher is recommended for performance
    region: oregon # Choose a region close to you
    branch: main
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: documenso-db
          property: connectionString
      - key: NEXT_PUBLIC_WEBAPP_URL
        sync: false # You will manually set this to your Render URL after creation
      - key: NEXTAUTH_URL
        sync: false # Same as above, set to your Render URL
      - key: NEXTAUTH_SECRET
        generateValue: true
      # Email Settings (Required for auth & sending docs)
      - key: SMTP_MAIL_HOST
        sync: false
      - key: SMTP_MAIL_PORT
        value: 587
      - key: SMTP_MAIL_USER
        sync: false
      - key: SMTP_MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false # e.g., "noreply@yourdomain.com"

databases:
  - name: documenso-db
    plan: starter # 'starter' is good for production-lite; 'free' expires after 90 days
    databaseName: documenso
    user: documenso

