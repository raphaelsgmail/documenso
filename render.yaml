services:
  - type: web
    name: documenso
    env: docker
    plan: free # Free Tier: Sleeps after 15 mins
    region: oregon
    branch: main
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      # We removed the 'fromDatabase' link. You will paste the Supabase URL in the dashboard.
      - key: DATABASE_URL
        sync: false 
      - key: NEXT_PUBLIC_WEBAPP_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      # Email Settings (Still required!)
      - key: SMTP_MAIL_HOST
        sync: false
      - key: SMTP_MAIL_PORT
        value: 587
      - key: SMTP_MAIL_USER
        sync: false
      - key: SMTP_MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false

# The 'databases' section is completely removed because we are using Supabase.
