services:
  - type: web
    name: documenso
    env: docker
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /api/health # <--- FIXED: Was /health
    envVars:
      - key: PORT
        value: 3000
      # FIXED: Documenso needs these specific names, not just DATABASE_URL
      - key: NEXT_PRIVATE_DATABASE_URL 
        sync: false
      - key: NEXT_PRIVATE_DIRECT_DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_WEBAPP_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: SMTP_MAIL_HOST
        sync: false
      - key: SMTP_MAIL_PORT
        value: 587
      - key: SMTP_MAIL_USER
        sync: false
      - key: SMTP_MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
